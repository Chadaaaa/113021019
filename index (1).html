<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>柯遵志的個人網頁</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    header {
      background: #3a7bd5;
      color: white;
      text-align: center;
      padding: 60px 20px 40px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #fff;
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    header h1 { font-size: 2rem; margin-bottom: 6px; }
    header p  { font-size: 1rem; opacity: 0.85; }

    nav {
      background: #2c6abf;
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 10px;
    }
    nav a {
      color: white;
      text-decoration: none;
      padding: 6px 18px;
      border-radius: 20px;
      font-size: 0.9rem;
      transition: background 0.2s;
    }
    nav a:hover { background: rgba(255,255,255,0.2); }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    section { margin-bottom: 48px; }

    h2 {
      font-size: 1.3rem;
      color: #3a7bd5;
      border-left: 4px solid #3a7bd5;
      padding-left: 12px;
      margin-bottom: 20px;
    }

    .about-text { line-height: 1.9; color: #444; font-size: 0.97rem; }

    /* 興趣 tags */
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
    .tag {
      background: #e8f0fe;
      color: #3a7bd5;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    /* 照片牆 */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .photo-box {
      background: #dde8fa;
      border-radius: 8px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      cursor: pointer;
      transition: transform 0.2s;
      position: relative;
      overflow: hidden;
    }
    .photo-box:hover { transform: scale(1.04); }
    .photo-label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: rgba(58,123,213,0.75);
      color: white;
      font-size: 0.75rem;
      text-align: center;
      padding: 4px 0;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .photo-box:hover .photo-label { opacity: 1; }

    /* 留言板 */
    .message-form { display: flex; flex-direction: column; gap: 10px; }
    .message-form input,
    .message-form textarea {
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
    }
    .message-form input:focus,
    .message-form textarea:focus {
      outline: none;
      border-color: #3a7bd5;
    }
    .message-form button {
      align-self: flex-start;
      background: #3a7bd5;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    .message-form button:hover { background: #2c6abf; }

    .message-list { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; }
    .message-card {
      background: white;
      border-radius: 8px;
      padding: 14px 16px;
      border: 1px solid #e0e0e0;
    }
    .message-card .name { font-weight: bold; color: #3a7bd5; font-size: 0.9rem; margin-bottom: 4px; }
    .message-card .text { font-size: 0.92rem; color: #444; line-height: 1.6; }
    .message-card .time { font-size: 0.78rem; color: #999; margin-top: 6px; }

    /* 計數器 */
    .counter-box {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .counter-num {
      font-size: 3rem;
      font-weight: bold;
      color: #3a7bd5;
    }
    .counter-buttons { display: flex; gap: 12px; }
    .counter-buttons button {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 2px solid #3a7bd5;
      background: white;
      color: #3a7bd5;
      font-size: 1.4rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .counter-buttons button:hover { background: #3a7bd5; color: white; }
    .counter-label { font-size: 0.85rem; color: #888; }

    footer {
      text-align: center;
      padding: 24px;
      background: #333;
      color: #aaa;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

<header>
  <div class="avatar">😊</div>
  <h1>柯遵志</h1>
  <p>學號 113021019 ｜ 亞洲大學</p>
</header>

<nav>
  <a href="#about">關於我</a>
  <a href="#photos">生活照</a>
  <a href="#counter">小工具</a>
  <a href="#guestbook">留言板</a>
</nav>

<main>

  <!-- 關於我 -->
  <section id="about">
    <h2>關於我</h2>
    <p class="about-text">
      嗨！我是遵志，目前就讀亞洲大學。<br>
      平常喜歡打籃球、聽音樂，偶爾也會煮飯給自己吃。<br>
      這是我練習做的第一個個人網頁，希望你會喜歡 😄
    </p>
    <div class="tags">
      <span class="tag">🏀 籃球</span>
      <span class="tag">🎵 音樂</span>
      <span class="tag">🍜 煮飯</span>
      <span class="tag">💻 寫程式</span>
      <span class="tag">🎮 打遊戲</span>
      <span class="tag">🐱 喜歡貓</span>
    </div>
  </section>

  <!-- 生活照 -->
  <section id="photos">
    <h2>生活紀錄</h2>
    <div class="photo-grid" id="photo-grid">
      <div class="photo-box" data-label="打球">🏀<span class="photo-label">打球</span></div>
      <div class="photo-box" data-label="宿舍">🏠<span class="photo-label">宿舍</span></div>
      <div class="photo-box" data-label="美食">🍜<span class="photo-label">美食</span></div>
      <div class="photo-box" data-label="圖書館">📚<span class="photo-label">圖書館</span></div>
      <div class="photo-box" data-label="貓咪">🐱<span class="photo-label">貓咪</span></div>
      <div class="photo-box" data-label="夜景">🌙<span class="photo-label">夜景</span></div>
    </div>
    <p id="click-msg" style="margin-top:12px; font-size:0.85rem; color:#999; text-align:center;"></p>
  </section>

  <!-- 小工具：計數器 -->
  <section id="counter">
    <h2>今天喝了幾杯水？</h2>
    <div class="counter-box">
      <div class="counter-num" id="count">0</div>
      <div class="counter-buttons">
        <button id="btn-minus">−</button>
        <button id="btn-plus">＋</button>
      </div>
      <div class="counter-label" id="counter-msg">點＋來記錄喝水次數！</div>
    </div>
  </section>

  <!-- 留言板 -->
  <section id="guestbook">
    <h2>留言板</h2>
    <div class="message-form">
      <input type="text" id="msg-name" placeholder="你的名字" maxlength="20" />
      <textarea id="msg-text" placeholder="留下你的話..." rows="3" maxlength="200"></textarea>
      <button id="msg-submit">送出留言</button>
    </div>
    <div class="message-list" id="message-list"></div>
  </section>

</main>

<footer>
  <p>© 2025 柯遵志的個人網頁 ｜ 用 HTML + CSS + JavaScript 手刻</p>
</footer>

<script>
  // ── 照片格點點擊 ──
  document.querySelectorAll('.photo-box').forEach(function(box) {
    box.addEventListener('click', function() {
      var label = this.getAttribute('data-label');
      document.getElementById('click-msg').textContent = '你點了「' + label + '」！（這裡可以之後放真實照片）';
    });
  });

  // ── 喝水計數器 ──
  var count = 0;
  var msgs = ['點＋來記錄喝水次數！', '喝了 1 杯，繼續加油！', '2 杯了，不錯！', '3 杯，保持！', '4 杯，快達標囉！', '5 杯，今天表現很好！', '6 杯，超厲害！', '7 杯！水分充足 💧', '8 杯！完美達標 🎉'];

  function updateCounter() {
    document.getElementById('count').textContent = count;
    var m = msgs[Math.min(count, msgs.length - 1)];
    if (count === 0) m = '點＋來記錄喝水次數！';
    document.getElementById('counter-msg').textContent = m;
  }

  document.getElementById('btn-plus').addEventListener('click', function() {
    count++;
    updateCounter();
  });

  document.getElementById('btn-minus').addEventListener('click', function() {
    if (count > 0) { count--; updateCounter(); }
  });

  // ── 留言板 ──
  var messages = [
    { name: '阿志', text: '遵志你的網頁好厲害！', time: '10:30' },
    { name: '同學A', text: '加油！繼續做更多功能 😊', time: '10:45' }
  ];

  function renderMessages() {
    var list = document.getElementById('message-list');
    list.innerHTML = '';
    messages.slice().reverse().forEach(function(m) {
      var card = document.createElement('div');
      card.className = 'message-card';
      card.innerHTML = '<div class="name">' + m.name + '</div><div class="text">' + m.text + '</div><div class="time">' + m.time + '</div>';
      list.appendChild(card);
    });
  }

  document.getElementById('msg-submit').addEventListener('click', function() {
    var name = document.getElementById('msg-name').value.trim();
    var text = document.getElementById('msg-text').value.trim();
    if (!name || !text) { alert('請填入名字和留言！'); return; }
    var now = new Date();
    var time = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
    messages.push({ name: name, text: text, time: time });
    document.getElementById('msg-name').value = '';
    document.getElementById('msg-text').value = '';
    renderMessages();
  });

  renderMessages();
</script>

</body>
</html>
